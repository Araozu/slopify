name: "Copilot Setup Steps"

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    # Setup Vite plus
    - name: Setup Node.js
      uses: voidzero-dev/setup-vp@v1
      with:
        node-version: '24'
        cache: true

    - name: Checkout code
      uses: actions/checkout@v5

    - run: vp install
