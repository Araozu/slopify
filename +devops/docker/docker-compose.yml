services:
  app:
    build:
      context: ../..
      dockerfile: +devops/docker/Dockerfile
    image: slopify-app:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/slopify
      DATABASE_MAX_CONNECTIONS: 5
      STATIC_DIR: /app/static
    ports:
      - "4000:4000"

  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: slopify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d slopify"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
